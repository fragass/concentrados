<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamLite</title>
  <link rel="stylesheet" href="css/app.css">
  <script>
    if (!sessionStorage.getItem("token") || !sessionStorage.getItem("loggedUser")) {
      window.location.href = "index.html";
    }
  </script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="profile-card">
          <div class="avatar" id="currentUserAvatar">U</div>
          <div>
            <strong id="currentDisplayName">Usuário</strong>
            <small id="currentUsername">@usuario</small>
          </div>
          <button id="logoutBtn" class="ghost-btn">Sair</button>
        </div>

        <div class="search-box compact-search">
          <input type="text" id="userSearchInput" placeholder="Adicionar por username">
          <button id="searchUserBtn" class="ghost-btn small" type="button">Buscar</button>
        </div>
        <div id="searchFeedback" class="mini-feedback">Digite um username para buscar.</div>
        <div id="searchResults" class="search-results compact-list"></div>

        <div class="section-head compact-head">
          <span>Recebidos</span>
        </div>
        <div id="incomingRequests" class="request-list compact-list"></div>

        <div class="section-head compact-head">
          <span>Enviados</span>
        </div>
        <div id="outgoingRequests" class="request-list compact-list"></div>

        <div class="section-head section-head-actions compact-head">
          <span>Conversas</span>
          <button id="newGroupBtn" class="primary-btn small">Grupo</button>
        </div>
      </div>

      <div id="conversationList" class="conversation-list"></div>
    </aside>

    <main class="chat-area idle" id="chatArea">
      <header class="chat-header" id="chatHeader">
        <div>
          <h2 id="chatTitle">Selecione uma conversa</h2>
          <p id="chatSubtitle">Seus contatos e grupos aparecem na lateral.</p>
        </div>
      </header>

      <section id="messages" class="messages empty-state-wrap">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">💬</div>
          <h3>Nenhuma conversa aberta</h3>
          <p>Escolha um contato ou grupo na lateral para começar.</p>
        </div>
      </section>

      <footer class="composer hidden" id="composer">
        <div class="image-chip hidden" id="imageChip">
          <span id="imageName">imagem</span>
          <button id="removeImageBtn" class="ghost-btn small" type="button">Remover</button>
        </div>
        <div class="composer-row">
          <label class="attach-btn" for="imageInput">📎</label>
          <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp" hidden>
          <textarea id="messageInput" placeholder="Digite uma mensagem" rows="1"></textarea>
          <button id="sendBtn" class="primary-btn" type="button">Enviar</button>
        </div>
      </footer>
    </main>
  </div>

  <div class="modal hidden" id="groupModal">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-card">
      <div class="modal-head">
        <h3>Novo grupo</h3>
        <button class="ghost-btn small" type="button" data-close-modal>Fechar</button>
      </div>
      <label class="modal-field">
        <span>Nome do grupo</span>
        <input type="text" id="groupTitleInput" maxlength="60" placeholder="Ex.: Equipe Operação">
      </label>
      <div class="modal-field">
        <span>Escolha os contatos</span>
        <div id="groupContactsList" class="group-contacts-list"></div>
      </div>
      <button id="createGroupBtn" class="primary-btn" type="button">Criar grupo</button>
      <p id="groupError" class="error-msg"></p>
    </div>
  </div>

  <template id="messageTemplate">
    <article class="message-item">
      <div class="avatar small"></div>
      <div class="message-bubble-wrap">
        <div class="message-meta">
          <strong class="message-author"></strong>
          <span class="message-time"></span>
        </div>
        <div class="message-bubble"></div>
      </div>
    </article>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
